app = "streakflow-worker"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile.worker"

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

[deploy]
  release_command = "npm run db:migrate:prod"
